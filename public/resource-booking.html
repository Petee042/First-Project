<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Resource Booking - AutomaticPeople</title>
  <link rel="stylesheet" href="styles.v20260520.css" />
</head>
<body class="logged-page">
  <div class="sticky-page-chrome">
    <div class="sticky-page-inner">
      <nav class="dashboard-tab-bar page-top-nav" aria-label="Main navigation">
        <a class="dashboard-tab-link active" href="/dashboard.html?tab=panel-dashboard">Dashboard</a>
        <a class="dashboard-tab-link" href="/dashboard.html?tab=panel-config">Config</a>
        <a class="dashboard-tab-link" href="/dashboard.html?tab=panel-ops">Ops</a>
        <a class="dashboard-tab-link" href="/dashboard.html?tab=panel-account">Account</a>
      </nav>
      <p id="stickyMessageBar" class="sticky-message-bar" aria-live="polite">No current messages.</p>
    </div>
  </div>

  <main class="dashboard">
    <div class="card-container wide public-booking-card">
      <div class="feed-actions back-row" style="margin-bottom: 0.7rem;">
        <button id="backBtn" type="button" class="back-arrow-control" aria-label="Back"></button>
      </div>

      <h2>New Resource Booking</h2>
      <p id="resourceBookingMessage" class="message"></p>

      <section class="listing-form-section">
        <div class="calendar-source-row">
          <label for="resourceBookingResourceSelect">Facility</label>
          <select id="resourceBookingResourceSelect">
            <option value="">Select a facility</option>
          </select>
        </div>
      </section>

      <section class="listing-form-section">
        <h3 id="publicBookingResourceName">Resource</h3>
        <div id="publicBookingDescription" class="public-booking-description"><p class="public-booking-placeholder">Select a facility to begin.</p></div>
      </section>

      <section id="bookingRequestSection" class="listing-form-section">
        <h3>Booking Request</h3>
        <form id="publicBookingRequestForm" novalidate>
          <div class="table-wrap">
            <table class="calendar-table public-booking-table" aria-label="Booking request dates and estimated times">
              <thead>
                <tr>
                  <th></th>
                  <th>Date</th>
                  <th>Estimated Time</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th scope="row">Checkin</th>
                  <td>
                    <input id="guestCheckinDate" type="date" />
                  </td>
                  <td>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem;">
                      <input id="guestCheckinHour" type="number" min="0" max="23" placeholder="HH" inputmode="numeric" />
                      <input id="guestCheckinMinute" type="number" min="0" max="59" placeholder="MM" inputmode="numeric" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">Checkout</th>
                  <td>
                    <input id="guestCheckoutDate" type="date" />
                  </td>
                  <td>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem;">
                      <input id="guestCheckoutHour" type="number" min="0" max="23" placeholder="HH" inputmode="numeric" />
                      <input id="guestCheckoutMinute" type="number" min="0" max="59" placeholder="MM" inputmode="numeric" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">Requested Start</th>
                  <td>
                    <input id="requestedBookingStartDate" type="date" />
                  </td>
                  <td>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem;">
                      <input id="requestedBookingStartHour" type="number" min="0" max="23" placeholder="HH" inputmode="numeric" />
                      <input id="requestedBookingStartMinute" type="number" min="0" max="59" placeholder="MM" inputmode="numeric" />
                    </div>
                  </td>
                </tr>
                <tr>
                  <th scope="row">Requested End</th>
                  <td>
                    <input id="requestedBookingEndDate" type="date" />
                  </td>
                  <td>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem;">
                      <input id="requestedBookingEndHour" type="number" min="0" max="23" placeholder="HH" inputmode="numeric" />
                      <input id="requestedBookingEndMinute" type="number" min="0" max="59" placeholder="MM" inputmode="numeric" />
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div id="bookingSpacesRequiredRow" class="calendar-source-row public-booking-spaces-row hidden">
            <label for="spacesRequired">Spaces Required</label>
            <div class="public-booking-spaces-wrap">
              <input id="spacesRequired" type="number" min="1" step="1" value="1" />
              <p id="spacesRequiredHint" class="public-booking-spaces-hint"></p>
            </div>
          </div>

          <p id="bookingRateLine" class="public-booking-rate-line">The rate for the reservation will be: --</p>

          <div id="bookingActionRow" class="public-booking-action-row">
            <button type="button" id="checkAvailabilityBtn" class="btn primary public-booking-action-btn">Check Availability</button>
            <select id="bookingPaymentSelect" class="public-booking-payment-select">
              <option value="">Select a payment option</option>
            </select>
            <button type="button" id="reserveBtn" class="btn primary public-booking-action-btn">Reserve</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="sticky-layout.js"></script>
  <script src="resource-booking.js"></script>
</body>
</html>
