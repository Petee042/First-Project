<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container" style="max-width: 720px; margin: 48px auto;">
    <h1>Reset Password</h1>
    <p id="reset-status" class="message">Enter your new password.</p>

    <form id="resetPasswordForm" novalidate>
      <div class="field">
        <label for="rp-password">New Password <span class="hint">(min 8, 1 uppercase, 1 number, 1 special)</span></label>
        <input type="password" id="rp-password" name="password" autocomplete="new-password" required minlength="8" />
      </div>
      <div class="field">
        <label for="rp-password-confirm">Confirm Password</label>
        <input type="password" id="rp-password-confirm" name="passwordConfirm" autocomplete="new-password" required minlength="8" />
      </div>
      <p id="reset-detail" class="message"></p>
      <button type="submit" class="btn primary">Reset Password</button>
    </form>

    <p>
      <a href="/index.html">Go to Login</a>
    </p>
  </main>

  <script src="/reset-password.js"></script>
</body>
</html>
