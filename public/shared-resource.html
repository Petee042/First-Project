<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Resource - AutomaticPeople</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-bar">
    <div class="header-left">
      <button id="backBtn" class="btn secondary">Back</button>
      <a class="top-brand-link" href="/dashboard.html" aria-label="AutomaticPeople home">
        <img class="top-brand-logo" src="/images/Icon.jpg" alt="AutomaticPeople logo" />
      </a>
    </div>
    <button id="logoutBtn" class="btn secondary">Log Out</button>
  </header>

  <main class="dashboard">
    <div class="card-container wide">
      <h2 id="sharedResourceTitle">Shared Resource</h2>
      <p id="sharedResourceMessage" class="message"></p>

      <section class="listing-form-section">
        <h3>Bookable Shared Resource Configuration</h3>
        <form id="sharedResourceForm" novalidate>
          <div class="calendar-source-row resource-booking-url-row">
            <label for="bookingPageUrl">Booking Page URL</label>
            <div class="resource-booking-url-wrap">
              <input id="bookingPageUrl" type="text" readonly />
              <button type="button" id="copyBookingPageUrlBtn" class="btn secondary">Copy</button>
            </div>
          </div>

          <div class="calendar-source-row">
            <label for="shortDescription">Short Description</label>
            <input id="shortDescription" type="text" maxlength="160" required />
          </div>

          <div class="calendar-source-row">
            <label for="resourceType">Resource Type</label>
            <select id="resourceType">
              <option value="undefined">Undefined</option>
              <option value="parking">Parking</option>
            </select>
          </div>

          <div class="calendar-source-row resource-editor-row">
            <label>Full Description</label>
            <div class="resource-editor-wrap">
              <div class="resource-editor-toolbar" role="toolbar" aria-label="Formatting toolbar">
                <button type="button" class="btn secondary editor-btn" data-command="bold"><strong>B</strong></button>
                <button type="button" class="btn secondary editor-btn" data-command="italic"><em>I</em></button>
                <button type="button" class="btn secondary editor-btn" data-command="underline"><span class="editor-underline">U</span></button>
                <button type="button" class="btn secondary editor-btn" data-command="insertUnorderedList">Bullets</button>
                <button type="button" class="btn secondary editor-btn" data-command="insertOrderedList">Numbers</button>
              </div>
              <div id="fullDescriptionEditor" class="resource-editor" contenteditable="true" spellcheck="true" aria-label="Full description editor"></div>
            </div>
          </div>

          <div class="calendar-source-row">
            <label for="maxUnits">Maximum Units</label>
            <input id="maxUnits" type="number" min="1" step="1" required />
          </div>

          <div class="calendar-source-row">
            <label for="maxDaysAdvanceBooking">Max days advance booking</label>
            <input id="maxDaysAdvanceBooking" type="number" min="1" max="365" step="1" required />
          </div>

          <div class="calendar-source-row">
            <label for="sharedResourcePropertyId">Property</label>
            <select id="sharedResourcePropertyId">
              <option value="">All Properties</option>
            </select>
          </div>

          <div class="calendar-source-row">
            <label for="sharedResourceListingId">Listing</label>
            <select id="sharedResourceListingId">
              <option value="">All Listings</option>
            </select>
          </div>

          <div class="calendar-source-row resource-payment-row">
            <label>Payment Options</label>
            <div class="resource-payment-options" aria-label="Payment options">
              <label class="resource-payment-option" for="paymentFreeOfCharge">
                <input id="paymentFreeOfCharge" type="checkbox" />
                <span>Free Of Charge</span>
              </label>
              <label class="resource-payment-option" for="paymentCashOnSite">
                <input id="paymentCashOnSite" type="checkbox" />
                <span>Cash On Site</span>
              </label>
              <label class="resource-payment-option" for="paymentBankTransfer">
                <input id="paymentBankTransfer" type="checkbox" />
                <span>Bank Transfer</span>
              </label>
              <label class="resource-payment-option" for="paymentOnlinePayment">
                <input id="paymentOnlinePayment" type="checkbox" />
                <span>Online Payment</span>
              </label>
            </div>
          </div>

          <div class="calendar-source-row resource-payment-messages-row">
            <label>Payment Page Messages</label>
            <div class="resource-payment-messages-wrap">
              <div class="resource-payment-tabs" role="tablist" aria-label="Payment message tabs">
                <button type="button" id="paymentTabFreeOfCharge" class="btn secondary resource-payment-tab is-active" data-payment-tab="free_of_charge" role="tab" aria-selected="true">Free Of Charge</button>
                <button type="button" id="paymentTabCashOnSite" class="btn secondary resource-payment-tab" data-payment-tab="cash_on_site" role="tab" aria-selected="false">Cash On Site</button>
                <button type="button" id="paymentTabBankTransfer" class="btn secondary resource-payment-tab" data-payment-tab="bank_transfer" role="tab" aria-selected="false">Bank Transfer</button>
                <button type="button" id="paymentTabOnlinePayment" class="btn secondary resource-payment-tab" data-payment-tab="online_payment" role="tab" aria-selected="false">Online Payment</button>
              </div>

              <div class="resource-editor-wrap">
                <div class="resource-editor-toolbar" role="toolbar" aria-label="Payment message formatting toolbar">
                  <button type="button" class="btn secondary payment-editor-btn" data-command="bold"><strong>B</strong></button>
                  <button type="button" class="btn secondary payment-editor-btn" data-command="italic"><em>I</em></button>
                  <button type="button" class="btn secondary payment-editor-btn" data-command="underline"><span class="editor-underline">U</span></button>
                  <button type="button" class="btn secondary payment-editor-btn" data-command="insertUnorderedList">Bullets</button>
                  <button type="button" class="btn secondary payment-editor-btn" data-command="insertOrderedList">Numbers</button>
                </div>
                <div id="paymentMessageEditor" class="resource-editor" contenteditable="true" spellcheck="true" aria-label="Payment message editor"></div>
              </div>
            </div>
          </div>

          <div class="calendar-source-row resource-charge-row">
            <label>Charge Logic</label>
            <div class="resource-charge-config">
              <p id="chargeConfigSummary" class="resource-charge-summary">Charge configuration not set.</p>
              <button type="button" id="openChargeConfigBtn" class="btn secondary">Configure Charges</button>
            </div>
          </div>

          <div class="feed-actions">
            <button type="submit" class="btn primary calendar-btn">Save Shared Resource</button>
            <button type="button" id="deleteSharedResourceBtn" class="btn secondary">Delete Shared Resource</button>
          </div>
        </form>
      </section>

      <section class="listing-form-section" style="margin-top: 2rem;">
        <h3>Reservations</h3>
        <p id="adminReservationsMessage" class="message"></p>
        <div class="table-wrap public-resource-reservations-wrap">
          <table class="calendar-table" aria-label="Shared resource reservations">
            <thead>
              <tr>
                <th>Reservation ID</th>
                <th>Start</th>
                <th>End</th>
                <th>Family Name</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="adminSharedReservationsBody">
              <tr>
                <td colspan="6" class="public-resource-reservations-empty">No reservations yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <dialog id="chargeConfigDialog" class="resource-dialog">
    <form id="chargeConfigDialogForm" method="dialog" novalidate>
      <div class="resource-dialog-header">
        <h3>Charge Logic Configuration</h3>
        <button type="button" id="closeChargeConfigBtn" class="btn secondary">Close</button>
      </div>

      <div class="resource-dialog-body">
        <fieldset class="resource-dialog-fieldset">
          <legend>Charge Basis</legend>
          <label class="resource-radio-option" for="chargeBasisDaily">
            <input id="chargeBasisDaily" type="radio" name="chargeBasis" value="daily" />
            <span>Daily</span>
          </label>
          <label class="resource-radio-option" for="chargeBasisHourly">
            <input id="chargeBasisHourly" type="radio" name="chargeBasis" value="hourly" />
            <span>Hourly</span>
          </label>
        </fieldset>

        <fieldset id="dailyChargeOptions" class="resource-dialog-fieldset hidden">
          <legend>Daily Charging</legend>
          <label class="resource-radio-option" for="dailyChargePer24Hours">
            <input id="dailyChargePer24Hours" type="radio" name="dailyChargeMode" value="per_24_hours" />
            <span>Per 24 hours</span>
          </label>
          <label class="resource-radio-option" for="dailyChargePerCalendarDay">
            <input id="dailyChargePerCalendarDay" type="radio" name="dailyChargeMode" value="per_calendar_day" />
            <span>Per Calendar Day</span>
          </label>
          <div id="dailyRateWrap" class="resource-rate-input-wrap">
            <label for="dailyRate">Daily rate</label>
            <input id="dailyRate" type="number" min="0" step="0.01" inputmode="decimal" />
          </div>
        </fieldset>

        <fieldset id="hourlyChargeOptions" class="resource-dialog-fieldset hidden">
          <legend>Hourly Charging</legend>
          <label class="resource-radio-option" for="hourlyChargeSingleRate">
            <input id="hourlyChargeSingleRate" type="radio" name="hourlyChargeMode" value="single_rate" />
            <span>Simple numeric rate per hour</span>
          </label>
          <div id="singleHourlyRateWrap" class="resource-rate-input-wrap hidden">
            <label for="singleHourlyRate">Hourly rate</label>
            <input id="singleHourlyRate" type="number" min="0" step="0.01" inputmode="decimal" />
          </div>

          <label class="resource-radio-option" for="hourlyChargePerHourOfDay">
            <input id="hourlyChargePerHourOfDay" type="radio" name="hourlyChargeMode" value="per_hour_of_day" />
            <span>Separate hourly rate for each of 24 hours</span>
          </label>
          <div id="hourlyRateGrid" class="resource-hourly-grid hidden" aria-label="Hourly rates by hour"></div>
        </fieldset>
      </div>

      <div class="resource-dialog-actions">
        <button type="button" id="saveChargeConfigBtn" class="btn primary calendar-btn">Save Charge Logic</button>
      </div>
    </form>
  </dialog>

  <script src="shared-resource.js"></script>
</body>
</html>
