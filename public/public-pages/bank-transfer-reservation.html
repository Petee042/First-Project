<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank Transfer Reservation</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="dashboard">
    <div class="card-container wide public-booking-card">
      <h2 id="reservationTitle">Bank Transfer Reservation</h2>
      <p id="reservationMessage" class="message"></p>

      <section class="listing-form-section">
        <h3>Payment Information</h3>
        <div id="paymentMethodMessage" class="public-reservation-payment-message"></div>
      </section>

      <section class="listing-form-section">
        <h3>Reservation Details</h3>
        <dl class="public-reservation-details">
          <dt>Reservation starts</dt>
          <dd id="reservationStart">-</dd>
          <dt>Reservation ends</dt>
          <dd id="reservationEnd">-</dd>
          <dt>Reservation price</dt>
          <dd id="reservationPrice">-</dd>
        </dl>
      </section>

      <section class="listing-form-section">
        <h3>Guest Details</h3>
        <div class="public-reservation-guest-grid">
          <label for="guestFirstName">First name</label>
          <input id="guestFirstName" type="text" maxlength="100" autocomplete="given-name" required />

          <label for="guestFamilyName">Family name</label>
          <input id="guestFamilyName" type="text" maxlength="100" autocomplete="family-name" required />

          <label for="guestEmailAddress">Email address</label>
          <input id="guestEmailAddress" type="email" maxlength="254" autocomplete="email" required />

          <label for="guestTelephone">Telephone</label>
          <input id="guestTelephone" type="tel" maxlength="60" autocomplete="tel" required />
        </div>
      </section>

      <div class="feed-actions">
        <button type="button" id="backToPaymentBtn" class="btn secondary">Back to Payment Selection</button>
        <button type="button" id="submitReservationBtn" class="btn primary">Confirm Reservation</button>
      </div>
    </div>
  </main>

  <script src="bank-transfer-reservation.js"></script>
</body>
</html>
