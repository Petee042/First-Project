<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Resource Booking</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="dashboard">
    <div class="card-container wide public-booking-card">
      <h2 id="publicBookingTitle">Shared Resource Booking Request</h2>
      <p id="publicBookingMessage" class="message"></p>

      <section class="listing-form-section">
        <h3 id="publicBookingResourceName">Resource</h3>
        <div id="publicBookingDescription" class="public-booking-description"></div>
      </section>

      <section class="listing-form-section">
        <h3>Booking Request</h3>
        <form id="publicBookingRequestForm" novalidate>
          <div class="table-wrap">
            <table class="calendar-table public-booking-table" aria-label="Booking request dates and estimated times">
              <thead>
                <tr>
                  <th></th>
                  <th>Date</th>
                  <th>Estimated Time</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th scope="row">Checkin</th>
                  <td>
                    <input id="guestCheckinDate" type="date" />
                  </td>
                  <td>
                    <input id="guestCheckinTime" type="time" />
                  </td>
                </tr>
                <tr>
                  <th scope="row">Checkout</th>
                  <td>
                    <input id="guestCheckoutDate" type="date" />
                  </td>
                  <td>
                    <input id="guestCheckoutTime" type="time" />
                  </td>
                </tr>
                <tr>
                  <th scope="row">Requested Start</th>
                  <td>
                    <input id="requestedBookingStartDate" type="date" />
                  </td>
                  <td>
                    <input id="requestedBookingStartTime" type="time" />
                  </td>
                </tr>
                <tr>
                  <th scope="row">Requested End</th>
                  <td>
                    <input id="requestedBookingEndDate" type="date" />
                  </td>
                  <td>
                    <input id="requestedBookingEndTime" type="time" />
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="booking.js"></script>
</body>
</html>
