<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listings - MyApp</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-bar">
    <span class="site-title top-title">MyApp</span>
    <button id="logoutBtn" class="btn secondary">Log Out</button>
  </header>

  <main class="dashboard">
    <div class="card-container wide">
      <h2>Your Listings</h2>
      <p id="dashboardMessage" class="message"></p>

      <div class="listings-block">
        <table class="calendar-table" aria-label="Your listings">
          <thead>
            <tr>
              <th>Listing Name</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="listingsTableBody">
            <tr>
              <td colspan="2">No listings yet.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <section class="listing-form-section">
        <h3>Create a Cleaning Schedule</h3>
        <form id="cleaningScheduleForm" novalidate>
          <div id="cleaningListings" class="cleaning-listings" aria-label="Select listings for cleaning schedule">
            <p class="cleaning-empty">No listings available.</p>
          </div>
          <div class="cleaning-actions-row">
            <label for="cleaningDays">Number of days</label>
            <input id="cleaningDays" type="number" min="1" max="365" value="14" required />
            <button id="downloadCleaningScheduleBtn" type="submit" class="btn primary calendar-btn">Download Schedule</button>
          </div>
        </form>
      </section>

      <section class="listing-form-section">
        <h3>Add New Listing</h3>
        <form id="addListingForm" novalidate>
          <div class="calendar-source-row">
            <label for="listingName">Listing Name</label>
            <input id="listingName" type="text" maxlength="120" required />
          </div>
          <button type="submit" class="btn primary calendar-btn">Add Listing</button>
        </form>
      </section>

      <section class="listing-form-section">
        <h3>Feed Source Colours</h3>
        <table class="calendar-table" aria-label="Feed source colours">
          <thead>
            <tr>
              <th>Feed Source</th>
              <th>Primary Colour</th>
            </tr>
          </thead>
          <tbody id="feedSourcesTableBody">
            <tr>
              <td colspan="2">No feed sources configured yet.</td>
            </tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
