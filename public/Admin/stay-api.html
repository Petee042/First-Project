<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stay API Tester - AutomaticPeople</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="top-bar">
    <div class="header-left">
      <a href="/Admin/index.html" class="btn secondary">Back to Admin</a>
      <a class="top-brand-link" href="/Admin/index.html" aria-label="AutomaticPeople admin home">
        <img class="top-brand-logo" src="/images/Icon.jpg" alt="AutomaticPeople logo" />
      </a>
    </div>
    <button id="adminLogoutBtn" class="btn secondary">Log Out</button>
  </header>

  <main class="dashboard">
    <div class="card-container wide admin-card api-tester-card">
      <h2>Stay API Test Console</h2>
      <p class="hint">Manually populate request fields and execute each endpoint. The API key is injected server-side and never exposed in the browser.</p>
      <p id="testerMessage" class="message" aria-live="polite"></p>

      <section id="apiTesterContainer" class="api-tester-listing">
        <p>Loading endpoint definitions...</p>
      </section>
    </div>
  </main>

  <script src="/Admin/stay-api.js"></script>
</body>
</html>
