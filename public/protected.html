<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard &mdash; MyApp</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-bar">
    <span class="site-title">MyApp</span>
    <button id="logoutBtn" class="btn secondary">Log Out</button>
  </header>

  <main class="dashboard">
    <div class="card-container wide">
      <h2>Welcome back, <span id="displayName"></span>!</h2>

      <table class="user-table">
        <tbody>
          <tr>
            <th>Username</th>
            <td id="displayUsername"></td>
          </tr>
          <tr>
            <th>Email</th>
            <td id="displayEmail"></td>
          </tr>
        </tbody>
      </table>

      <section class="calendar-section">
        <h3>Calendar Entries</h3>
        <div class="calendar-controls">
          <input
            id="calendarUrl"
            type="url"
            placeholder="Paste public ICS calendar URL"
            autocomplete="off"
          />
          <button id="loadCalendarBtn" class="btn primary calendar-btn" type="button">Load Calendar</button>
        </div>
        <p id="calendarMessage" class="message"></p>

        <div class="table-wrap">
          <table class="calendar-table" aria-label="Calendar entries">
            <thead>
              <tr>
                <th>Start</th>
                <th>Title</th>
                <th>Location</th>
              </tr>
            </thead>
            <tbody id="calendarTableBody">
              <tr>
                <td colspan="3">No entries loaded yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="protected.js"></script>
</body>
</html>
