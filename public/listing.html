<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listing - MyApp</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top-bar">
    <div class="header-left">
      <button id="backBtn" class="btn secondary">Back</button>
      <span class="site-title top-title">MyApp</span>
    </div>
    <button id="logoutBtn" class="btn secondary">Log Out</button>
  </header>

  <main class="dashboard">
    <div class="card-container wide">
      <h2 id="listingTitle">Listing</h2>
      <p id="listingMessage" class="message"></p>

      <section class="listing-form-section">
        <h3>Edit Listing Details</h3>
        <form id="renameListingForm" novalidate>
          <div class="calendar-source-row">
            <label for="listingName">Name</label>
            <input id="listingName" type="text" maxlength="120" required />
          </div>
          <div class="calendar-source-row">
            <label for="listingPropertyId">Property</label>
            <select id="listingPropertyId" required></select>
          </div>
          <button type="submit" class="btn primary calendar-btn">Save Listing</button>
        </form>
      </section>

      <section class="calendar-section">
        <h3>Calendar Feeds</h3>
        <div class="table-wrap">
          <table class="calendar-table" aria-label="Calendar feeds">
            <thead>
              <tr>
                <th>Source</th>
                <th>URL</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="feedsTableBody">
              <tr>
                <td colspan="3">No feeds yet.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <form id="feedForm" novalidate>
          <input type="hidden" id="feedId" />
          <div class="calendar-source-row">
            <label for="feedLabel">Feed Source</label>
            <input id="feedLabel" type="text" placeholder="Airbnb or Booking.com" maxlength="120" required />
          </div>
          <div class="calendar-source-row">
            <label for="feedUrl">Feed URL</label>
            <input id="feedUrl" type="url" placeholder="https://...ics" required />
          </div>
          <div class="feed-actions">
            <button type="submit" id="saveFeedBtn" class="btn primary calendar-btn">Add Feed</button>
            <button type="button" id="cancelFeedEditBtn" class="btn secondary hidden">Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="calendar-section">
        <h3>Reservation Calendar</h3>
        <button type="button" id="updateCalendarsBtn" class="btn primary calendar-btn">Update Calendars</button>
        <p id="calendarMessage" class="message"></p>

        <div class="calendar-month-header">
          <button type="button" id="prevMonthBtn" class="btn secondary">Prev</button>
          <h4 id="monthLabel" class="month-label">Month</h4>
          <button type="button" id="nextMonthBtn" class="btn secondary">Next</button>
        </div>

        <div id="calendarLegend" class="calendar-legend"></div>

        <div class="reservation-calendar-wrap">
          <div id="reservationCalendar" class="reservation-calendar" aria-label="Reservation month view"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="listing.js"></script>
</body>
</html>
