<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutomaticPeople Login</title>
  <style>
    :root {
      --bg: #f1f8f7;
      --card: rgba(255, 255, 255, 0.9);
      --text: #122a2a;
      --muted: #355a59;
      --accent: rgb(36, 105, 101);
      --accent-dark: #1c6c68;
      --border: rgba(18, 42, 42, 0.14);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Georgia, 'Times New Roman', Times, serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(36, 105, 101, 0.2), transparent 30%),
        linear-gradient(160deg, #f4fbfa 0%, #e6f3f2 100%);
      display: grid;
      place-items: center;
      padding: 1.25rem;
    }

    .ap-top-left-logo {
      position: fixed;
      top: 0.9rem;
      left: 0.9rem;
      width: 112px;
      height: 112px;
      display: inline-block;
      padding: 0.25rem;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(36, 105, 101, 0.2);
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(14, 74, 71, 0.2);
      z-index: 20;
    }

    .ap-top-left-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card {
      width: min(100%, 480px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(14, 74, 71, 0.14);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 0.75rem;
    }

    label {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      padding: 0.8rem 0.9rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      font: inherit;
    }

    button {
      margin-top: 0.5rem;
      border: 0;
      border-radius: 999px;
      padding: 0.9rem 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .ap-top-left-logo {
        width: 82px;
        height: 82px;
        top: 0.7rem;
        left: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <a class="ap-top-left-logo" href="/" aria-label="AutomaticPeople home">
    <img src="/images/Icon.jpg" alt="AutomaticPeople logo" />
  </a>

  <main class="card">
    <h1>Application Under Development</h1>
    <p>Please log in to continue.</p>

    <form method="post" action="/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Log In</button>
    </form>
  </main>
</body>
</html>
